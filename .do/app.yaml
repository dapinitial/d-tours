# DigitalOcean App Platform spec for D-Tours.
# Create the app with:  doctl apps create --spec .do/app.yaml
# (or in the DO console: Create App → GitHub → dapinitial/d-tours → it reads this)
name: d-tours
region: nyc
services:
  - name: web
    github:
      repo: dapinitial/d-tours
      branch: main
      deploy_on_push: true          # every push to main → auto-deploy
    environment_slug: node-js
    build_command: npm run build
    run_command: node dist/server/entry.mjs
    instance_size_slug: basic-xxs   # ~$5/mo; bump later if needed
    instance_count: 1
    http_port: 8080
    envs:
      # Astro node-standalone binds to these. PORT is injected by App Platform.
      - key: HOST
        value: "0.0.0.0"
      # Public Supabase values — safe to commit (publishable key is browser-safe).
      - key: PUBLIC_SUPABASE_URL
        value: "https://pucyvfwrosinnbgkremb.supabase.co"
      - key: PUBLIC_SUPABASE_PUBLISHABLE_KEY
        value: "sb_publishable_kfsnkzkm3RgaEdSerxsLww_SLsvygIQ"
      # ── Add in the DO dashboard as ENCRYPTED (never commit):
      #    SUPABASE_SECRET_KEY (sb_secret_...) — server writes
      #    MAPSHARE_FEED_URL, SMTP_*, NOTIFY_*  — comms (later)
